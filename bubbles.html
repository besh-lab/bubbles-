<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>bubbles</title>
<link rel="icon" href="data:,">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#EDEDED; --bg2:#FFFFFF; --text:#1C1C1E; --sub:#8A8A8E;
  --card:#FFFFFF; --border:#E3E3E5;
  --bubble-theirs:#FFFFFF; --bubble-theirs-border:#E3E3E5;
  --bubble-mine-default:#95EC69;   /* дефолтный "WeChat-зелёный", но юзер может выбрать любой */
  --accent:#07C160;                /* нейтральный акцент для кнопок/ссылок */
  --danger:#FA5151;
  --radius-avatar:8px; --radius-bubble:6px; --radius-card:12px;
}
[data-theme="dark"]{
  --bg:#131313; --bg2:#1C1C1E; --text:#F2F2F2; --sub:#8E8E93;
  --card:#1F1F21; --border:#2C2C2E;
  --bubble-theirs:#242426; --bubble-theirs-border:#2C2C2E;
  --bubble-mine-default:#2F7A3D;
  --accent:#2FCB6E;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;}
::-webkit-scrollbar{width:0;height:0;}
button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}
img,video{max-width:100%;}

.screen{position:relative;min-height:100vh;}
.card{background:var(--card);border:1px solid var(--border);}

/* ---------- AUTH ---------- */
.auth-wrap{max-width:400px;margin:0 auto;padding:80px 20px;}
.auth-logo{font-weight:700;font-size:24px;text-align:center;letter-spacing:-.3px;}
.auth-tagline{text-align:center;color:var(--sub);font-size:13px;margin:6px 0 24px;}
.auth-card{border-radius:var(--radius-card);padding:20px;}
.auth-tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:16px;}
.auth-tab{flex:1;border:none;background:transparent;padding:9px;border-radius:6px;color:var(--sub);font-weight:600;font-size:13px;}
.auth-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08);}
.input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);outline:none;margin-bottom:10px;font-size:14px;}
.auth-error{color:var(--danger);font-size:12px;min-height:16px;margin-bottom:4px;}
.btn-primary{border:none;background:var(--accent);color:#fff;font-weight:600;padding:12px;border-radius:8px;font-size:14px;}
.btn-primary.full{width:100%;}
.btn-primary:disabled{opacity:.4;}
.btn-secondary{border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:600;padding:12px;border-radius:8px;font-size:14px;}

/* ---------- SHELL ---------- */
.app-frame{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.top-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border);}
.brand{font-weight:700;font-size:17px;}
.top-actions{display:flex;gap:8px;}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text);}
.icon-btn:active{opacity:.6;}
.icon-btn i{width:17px;height:17px;}

.view{flex:1;overflow-y:auto;padding-bottom:70px;}
.view.full{padding:0;display:flex;flex-direction:column;overflow:hidden;}

.search-bar{display:flex;align-items:center;gap:8px;background:var(--card);border-bottom:1px solid var(--border);padding:11px 16px;color:var(--sub);font-size:14px;}
.search-bar i{width:15px;height:15px;}

/* ---------- LIST ---------- */
.list{display:flex;flex-direction:column;}
.list-row{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);background:var(--card);}
.list-row:active{background:var(--bg);}
.avatar{border-radius:var(--radius-avatar);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center;}
.list-row-body{flex:1;min-width:0;}
.list-row-top{display:flex;justify-content:space-between;}
.list-row-name{font-weight:600;font-size:15px;}
.list-row-time{font-size:11px;color:var(--sub);}
.list-row-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
.list-row-msg{font-size:13px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px;}
.unread-badge{background:var(--danger);color:#fff;font-size:11px;font-weight:700;border-radius:9px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px;}

/* ---------- CHAT ---------- */
.chat-header{display:flex;align-items:center;gap:8px;padding:12px 14px;flex-shrink:0;border-bottom:1px solid var(--border);}
.chat-header-info{flex:1;display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0;}
.chat-header-name{font-weight:600;font-size:15px;}
.chat-header-sub{font-size:11px;color:var(--sub);}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:var(--bg);}
.msg{max-width:76%;display:flex;flex-direction:column;}
.msg.mine{align-self:flex-end;align-items:flex-end;}
.msg.theirs{align-self:flex-start;align-items:flex-start;}
.msg-sender{font-size:11px;color:var(--sub);margin:0 4px 2px;}
.bubble{padding:9px 12px;border-radius:var(--radius-bubble);font-size:14.5px;word-break:break-word;border:1px solid transparent;}
.msg.mine .bubble{background:var(--bubble-mine-default);color:#1C1C1E;}
.msg.theirs .bubble{background:var(--bubble-theirs);border-color:var(--bubble-theirs-border);}
.bubble-time{font-size:10px;opacity:.6;margin-top:3px;text-align:right;}
.bubble-img{border-radius:var(--radius-bubble);max-width:220px;display:block;}
.bubble-circle{width:100px;height:100px;border-radius:var(--radius-bubble);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;background:var(--accent);cursor:pointer;}
.bubble-circle .play{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;}
.bubble-circle .dur{position:absolute;bottom:6px;font-size:10px;color:#fff;background:rgba(0,0,0,.4);padding:1px 7px;border-radius:8px;}
.bubble-file{display:flex;align-items:center;gap:10px;min-width:190px;}
.bubble-loc{width:200px;border-radius:var(--radius-bubble);overflow:hidden;border:1px solid var(--border);}
.bubble-loc .map-fake{height:80px;background:var(--accent);display:flex;align-items:center;justify-content:center;}

.attach-tray{display:flex;gap:8px;overflow-x:auto;padding:8px 14px;background:var(--card);border-top:1px solid var(--border);}
.attach-opt{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:62px;padding:10px 4px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:10px;}
.chat-input-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;}
.chat-input-pill{flex:1;display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;}
.chat-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;}
.send-btn{background:var(--accent);color:#fff;border:none;}
.voice-btn{background:var(--accent);color:#fff;border:none;}
.voice-btn.recording{opacity:.6;}

/* ---------- PROFILE ---------- */
.profile-head{padding:24px 20px;text-align:center;background:var(--card);border-bottom:1px solid var(--border);}
.profile-avatar-wrap{position:relative;display:inline-block;}
.profile-avatar-edit{position:absolute;bottom:-4px;right:-4px;width:26px;height:26px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;border:2px solid var(--card);}
.profile-name{font-weight:700;font-size:19px;margin-top:12px;}
.profile-username{font-size:13px;color:var(--sub);margin-top:2px;}
.profile-bio{font-size:13px;color:var(--sub);margin-top:10px;line-height:1.5;max-width:300px;margin-left:auto;margin-right:auto;}
.profile-actions{display:flex;gap:10px;margin-top:16px;}

/* ---------- BOTTOM NAV ---------- */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;padding:6px 0;display:flex;justify-content:space-around;border-top:1px solid var(--border);}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;padding:6px 20px;color:var(--sub);}
.nav-btn i{width:22px;height:22px;}
.nav-btn span{font-size:10px;font-weight:500;}
.nav-btn.active{color:var(--accent);}

/* ---------- MODALS ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.center{align-items:center;padding:16px;}
.modal-sheet{width:100%;max-width:460px;margin:0 auto;border-radius:14px 14px 0 0;padding:20px;background:var(--card);max-height:85vh;overflow-y:auto;}
.modal-sheet.card2{border-radius:14px;}
.modal-drag{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}

/* цветовая палитра — свободный выбор цвета */
.color-swatch{width:34px;height:34px;border-radius:8px;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
.color-swatch.selected{border-color:var(--text);}
input[type="color"]{width:44px;height:34px;border-radius:8px;border:1px solid var(--border);padding:2px;background:var(--bg2);cursor:pointer;}

/* ---------- CALL SCREEN ---------- */
.call-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 30px;background:#1C1C1E;color:#fff;}
.call-info,.call-avatar,.call-controls{position:relative;z-index:2;}
.call-avatar{width:110px;height:110px;border-radius:var(--radius-avatar);background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:32px;}
.call-controls{display:flex;gap:20px;}
.call-btn{width:54px;height:54px;border-radius:12px;border:none;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;}
.call-btn.end{width:62px;height:62px;background:var(--danger);}
video.local-video{position:absolute;bottom:100px;right:16px;width:96px;height:130px;border-radius:8px;object-fit:cover;z-index:3;border:1px solid rgba(255,255,255,.3);}
video.remote-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}

.hidden{display:none !important;}

</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>

<body>

<!-- ===================== AUTH ===================== -->
<div id="screen-auth" class="screen">
  <div class="auth-wrap">
    <div class="auth-logo">bubbles</div>
    <p class="auth-tagline">Приватный мессенджер</p>
    <div class="card auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Вход</button>
        <button class="auth-tab" data-mode="register">Регистрация</button>
      </div>
      <div id="auth-register-fields" style="display:none">
        <input id="reg-name" class="input" placeholder="Имя" />
        <input id="reg-username" class="input" placeholder="Никнейм (без @)" />
      </div>
      <input id="auth-email" class="input" type="email" placeholder="Email" />
      <input id="auth-password" class="input" type="password" placeholder="Пароль" />
      <div id="auth-error" class="auth-error"></div>
      <button id="auth-submit" class="btn-primary full">Войти</button>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="screen" style="display:none">
  <div class="app-frame">

    <div id="top-header" class="top-header">
      <div class="brand">bubbles</div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-qr"><i data-lucide="qr-code"></i></button>
      </div>
    </div>

    <!-- ===== CHATS LIST ===== -->
    <div id="view-chats" class="view">
      <div class="search-bar" id="new-chat-trigger"><i data-lucide="search"></i><span>Найти по нику / новый чат</span></div>
      <div id="chats-list" class="list"></div>
    </div>

    <!-- ===== PROFILE ===== -->
    <div id="view-profile" class="view" style="display:none"></div>

    <!-- ===== CHAT DETAIL ===== -->
    <div id="view-chat-detail" class="view full" style="display:none">
      <div class="chat-header card">
        <button class="icon-btn" id="chat-back"><i data-lucide="chevron-left"></i></button>
        <div id="chat-header-info" class="chat-header-info"></div>
        <button class="icon-btn" id="chat-color-btn" title="Цвет чата"><i data-lucide="palette"></i></button>
        <button class="icon-btn" id="chat-call-audio"><i data-lucide="phone"></i></button>
        <button class="icon-btn" id="chat-call-video"><i data-lucide="video"></i></button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div id="chat-attach-tray" class="attach-tray" style="display:none"></div>
      <div class="chat-input-row">
        <button class="icon-btn" id="btn-attach"><i data-lucide="plus"></i></button>
        <div class="chat-input-pill"><input id="chat-input" class="chat-input" placeholder="Сообщение..." /></div>
        <button class="icon-btn send-btn" id="btn-send"><i data-lucide="send"></i></button>
        <button class="icon-btn voice-btn" id="btn-voice" style="display:none"><i data-lucide="mic"></i></button>
      </div>
      <input type="file" id="file-input" style="display:none" accept="image/*,video/*,application/*" />
    </div>

    <!-- ===== CONTACT PROFILE ===== -->
    <div id="view-contact-profile" class="view full" style="display:none"></div>

    <div id="bottom-nav" class="card bottom-nav">
      <button class="nav-btn active" data-tab="chats"><i data-lucide="message-circle"></i><span>Чаты</span></button>
      <button class="nav-btn" data-tab="profile"><i data-lucide="user"></i><span>Профиль</span></button>
    </div>

  </div>
</div>

<div id="modal-root"></div>
<script>

/* ==== js/firebase-init.js ==== */
/*
  ШАГ 1 — вставь сюда конфиг своего Firebase-проекта.
  console.firebase.google.com → создать проект "bubbles-messenger"
  → значок </> (Add web app) → скопировать firebaseConfig.
*/
const firebaseConfig = {
  apiKey: "ВСТАВЬ_СЮДА",
  authDomain: "ВСТАВЬ_СЮДА.firebaseapp.com",
  projectId: "ВСТАВЬ_СЮДА",
  storageBucket: "ВСТАВЬ_СЮДА.appspot.com",
  messagingSenderId: "ВСТАВЬ_СЮДА",
  appId: "ВСТАВЬ_СЮДА",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// TURN/STUN сервера для звонков (WebRTC).
// Google STUN бесплатный и всегда доступен. TURN — свой coturn на Oracle Cloud (см. README).
const ICE_SERVERS = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    {
      urls: "turn:ВСТАВЬ_IP_ORACLE_VM:3478",
      username: "bubbles",
      credential: "ВСТАВЬ_ПАРОЛЬ_TURN"
    }
  ]
};


/* ==== js/auth.js ==== */
/* ---------------- AUTH ---------------- */

let currentUser = null;   // firebase auth user
let myProfile = null;     // Firestore users/{uid} doc

const AVATAR_GRADIENTS = [
  "linear-gradient(135deg,#7C6CFF,#35D0BA)",
  "linear-gradient(135deg,#FF6FA5,#FFB86C)",
  "linear-gradient(135deg,#35D0BA,#4C8CFF)",
  "linear-gradient(135deg,#FFB86C,#FF6FA5)",
  "linear-gradient(135deg,#4C8CFF,#7C6CFF)",
];
function randomGrad(){ return AVATAR_GRADIENTS[Math.floor(Math.random()*AVATAR_GRADIENTS.length)]; }

let authMode = "login";

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".auth-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".auth-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      authMode = tab.dataset.mode;
      document.getElementById("auth-register-fields").style.display = authMode === "register" ? "block" : "none";
      document.getElementById("auth-submit").textContent = authMode === "register" ? "Создать аккаунт" : "Войти";
      document.getElementById("auth-error").textContent = "";
    });
  });

  document.getElementById("auth-submit").addEventListener("click", handleAuthSubmit);
  document.getElementById("auth-password").addEventListener("keydown", e => { if (e.key === "Enter") handleAuthSubmit(); });
});

async function handleAuthSubmit(){
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value;
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";

  if (!email || !password) { errEl.textContent = "Заполни email и пароль"; return; }

  try {
    if (authMode === "register") {
      const name = document.getElementById("reg-name").value.trim();
      const username = document.getElementById("reg-username").value.trim().replace(/^@/, "");
      if (!name || !username) { errEl.textContent = "Заполни имя и никнейм"; return; }

      const cred = await auth.createUserWithEmailAndPassword(email, password);
      const uid = cred.user.uid;
      await db.collection("users").doc(uid).set({
        uid, name, username: "@" + username, email,
        bio: "", grad: randomGrad(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
  } catch (e) {
    errEl.textContent = translateAuthError(e.code);
  }
}

function translateAuthError(code){
  const map = {
    "auth/email-already-in-use": "Этот email уже зарегистрирован",
    "auth/invalid-email": "Неверный формат email",
    "auth/weak-password": "Пароль слишком слабый (минимум 6 символов)",
    "auth/user-not-found": "Пользователь не найден",
    "auth/wrong-password": "Неверный пароль",
    "auth/invalid-credential": "Неверный email или пароль",
  };
  return map[code] || "Ошибка: " + code;
}

function logout(){
  auth.signOut();
}

// главный слушатель состояния авторизации — управляет переключением экранов
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    const doc = await db.collection("users").doc(user.uid).get();
    myProfile = doc.exists ? doc.data() : null;
    document.getElementById("screen-auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    initApp();
  } else {
    currentUser = null;
    myProfile = null;
    document.getElementById("screen-auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});


/* ==== js/chats.js ==== */
/* ---------------- CHATS (Firestore) ----------------
   chats/{chatId}                : { type:'dm'|'group', members:[uid], name, grad, lastMsg, lastMsgTime, createdAt }
   chats/{chatId}/messages/{id}  : { senderId, senderName, type, text, mediaUrl, duration, isVideo,
                                      fileName, size, lat, lng, place, createdAt }
*/

let chatsUnsub = null;
let messagesUnsub = null;
let activeChatId = null;
let activeChatData = null;
let mediaRecorder = null;
let recordedChunks = [];
let lastMessages = [];

// быстрые пресеты + свободный выбор любого цвета через нативный color picker
const CHAT_COLOR_PRESETS = ["#95EC69","#7C6CFF","#4C8CFF","#FF6FA5","#FFB86C","#8A8A8E"];

function avatarInner(person){
  return person?.avatarUrl ? "" : initials(person?.name);
}
function avatarBg(person){
  return person?.avatarUrl ? `background-image:url('${person.avatarUrl}')` : `background:${person?.grad || randomGrad()}`;
}

function dmChatId(uidA, uidB){
  return [uidA, uidB].sort().join("_");
}

function listenMyChats(){
  if (chatsUnsub) chatsUnsub();
  chatsUnsub = db.collection("chats")
    .where("members", "array-contains", currentUser.uid)
    .orderBy("lastMsgTime", "desc")
    .onSnapshot(snap => {
      const chats = [];
      snap.forEach(doc => chats.push({ id: doc.id, ...doc.data() }));
      renderChatsList(chats);
    }, err => console.error("listenMyChats:", err));
}

async function renderChatsList(chats){
  const el = document.getElementById("chats-list");
  el.innerHTML = "";
  for (const chat of chats) {
    let displayName = chat.name, personLike = { grad: chat.grad };
    if (chat.type === "dm") {
      const otherUid = chat.members.find(m => m !== currentUser.uid);
      const other = await getUserProfile(otherUid);
      displayName = other ? other.name : "Пользователь";
      personLike = other || { grad: randomGrad() };
    }
    const row = document.createElement("div");
    row.className = "list-row";
    row.innerHTML = `
      <div class="avatar" style="width:46px;height:46px;font-size:16px;${avatarBg(personLike)}">${avatarInner(personLike)}</div>
      <div class="list-row-body">
        <div class="list-row-top">

async function setChatColor(chatId, color){

function renderMessages(msgs){
  const el = document.getElementById("chat-messages");
  el.innerHTML = msgs.map(m => messageHtml(m)).join("");
  el.scrollTop = el.scrollHeight;
  if (window.lucide) lucide.createIcons();

function messageHtml(m){
  const mine = m.senderId === currentUser.uid;
  const cls = mine ? "mine" : "theirs";
  const sender = !mine && activeChatData?.type === "group" ? `<div class="msg-sender">${escapeHtml(m.senderName||"")}</div>` : "";
  const accent = mine && activeChatData?.color ? activeChatData.color : null;
  const accentAttr = accent ? ` style="background:${accent}" class="bubble custom-accent"` : ` class="bubble"`;
  let body = "";
  if (m.type === "text") {
    body = `<div${accentAttr}>${escapeHtml(m.text)}<div class="bubble-time">${formatTime(m.createdAt)}</div></div>`;
  } else if (m.type === "image") {
    body = `<img class="bubble-img" src="${m.mediaUrl}" />`;
  } else if (m.type === "file") {
    body = `<div class="bubble bubble-file"><i data-lucide="file-text"></i><div><div style="font-weight:600;font-size:13px">${escapeHtml(m.fileName)}</div><div style="font-size:11px;color:var(--sub)">${m.size||""}</div></div></div>`;
  } else if (m.type === "circle") {
    body = `<div class="bubble-circle" onclick="playCircle('${m.mediaUrl}', ${!!m.isVideo})"><div class="play"><i data-lucide="play"></i></div><span class="dur">${m.duration||""}</span></div>`;
  } else if (m.type === "location") {
    body = `<div class="bubble bubble-loc"><div class="map-fake"><i data-lucide="map-pin" style="color:#fff"></i></div><div style="padding:8px 12px;font-size:12.5px">${escapeHtml(m.place||"Геолокация")}</div></div>`;
  }
  return `<div class="msg ${cls}">${sender}${body}</div>`;
}

function playCircle(url, isVideo){
  const modal = document.createElement("div");
  modal.className = "modal-overlay center";
  modal.innerHTML = isVideo
    ? `<video src="${url}" autoplay controls style="max-width:320px;border-radius:20px"></video>`
    : `<audio src="${url}" autoplay controls></audio>`;
  modal.addEventListener("click", (e)=>{ if(e.target===modal) modal.remove(); });
  document.getElementById("modal-root").appendChild(modal);
}

/* ---------- SENDING ---------- */

async function sendTextMessage(text){
  if (!text.trim() || !activeChatId) return;
  await addMessage({ type: "text", text: text.trim() });
}

async function addMessage(partial){
  const chatRef = db.collection("chats").doc(activeChatId);
  await chatRef.collection("messages").add({
    senderId: currentUser.uid,
    senderName: myProfile?.name || "",
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    ...partial,
  });
  let preview = partial.text || {image:"📷 Фото",file:"📎 Файл",circle: partial.isVideo ? "🎥 Видео-кружок" : "🎤 Голосовое",location:"📍 Геолокация"}[partial.type] || "Сообщение";
  await chatRef.update({
    lastMsg: preview,
    lastMsgTime: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

async function uploadFileToChat(file, type){
  const path = `chatMedia/${activeChatId}/${currentUser.uid}_${Date.now()}_${file.name || "voice"}`;
  const ref = storage.ref(path);
  await ref.put(file);
  const url = await ref.getDownloadURL();
  return url;
}

async function sendImageOrFile(file){
  const isImage = file.type.startsWith("image/");
  const url = await uploadFileToChat(file);
  if (isImage) {
    await addMessage({ type: "image", mediaUrl: url });
  } else {
    await addMessage({ type: "file", mediaUrl: url, fileName: file.name, size: humanSize(file.size) });
  }
}

async function sendLocationMessage(){
  if (!navigator.geolocation) { alert("Геолокация не поддерживается браузером"); return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    await addMessage({ type: "location", lat: latitude, lng: longitude, place: `${latitude.toFixed(4)}, ${longitude.toFixed(4)}` });
  }, () => alert("Не удалось получить геолокацию"));
}

/* ---------- VOICE / VIDEO CIRCLE RECORDING ---------- */

async function startRecording(isVideo){
  const constraints = isVideo ? { video: { width: 320, height: 320 }, audio: true } : { audio: true };
  const stream = await navigator.mediaDevices.getUserMedia(constraints);
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.start();
  return stream;
}

async function stopRecordingAndSend(isVideo, durationSec){
  return new Promise((resolve) => {
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks, { type: isVideo ? "video/webm" : "audio/webm" });
      const file = new File([blob], `${isVideo?"video":"voice"}_${Date.now()}.webm`, { type: blob.type });
      const url = await uploadFileToChat(file);
      await addMessage({ type: "circle", mediaUrl: url, isVideo, duration: formatDuration(durationSec) });
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      resolve();
    };
    mediaRecorder.stop();
  });
}

/* ---------- helpers ---------- */

function initials(name){ return (name||"").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function escapeHtml(s){ const d=document.createElement("div"); d.textContent = s||""; return d.innerHTML; }
function humanSize(bytes){ if(bytes<1024) return bytes+" Б"; if(bytes<1024*1024) return (bytes/1024).toFixed(0)+" КБ"; return (bytes/1024/1024).toFixed(1)+" МБ"; }
function formatDuration(sec){ const m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m}:${String(s).padStart(2,"0")}`; }
function formatTime(ts){
  if (!ts || !ts.toDate) return "";
  const d = ts.toDate();
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString("ru-RU",{day:"2-digit",month:"2-digit"});
}


/* ==== js/calls.js ==== */
/* ---------------- CALLS (WebRTC + Firestore signaling) ----------------
   calls/{callId}: { callerId, calleeId, callerName, calleeName, type:'audio'|'video', status, offer, answer, createdAt }
   calls/{callId}/callerCandidates/{id}
   calls/{callId}/calleeCandidates/{id}

   ICE_SERVERS (STUN + твой TURN на Oracle Cloud) определены в firebase-init.js
*/

let pc = null;
let localStream = null;
let activeCallId = null;
let incomingCallUnsub = null;
let callDocUnsub = null;

function listenIncomingCalls(){
  if (incomingCallUnsub) incomingCallUnsub();
  incomingCallUnsub = db.collection("calls")
    .where("calleeId", "==", currentUser.uid)
    .where("status", "==", "ringing")
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === "added") showIncomingCallUI({ id: change.doc.id, ...change.doc.data() });
      });
    });
}

async function startCall(calleeUid, calleeName, calleeGrad, isVideo){
  pc = new RTCPeerConnection(ICE_SERVERS);
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  const callRef = db.collection("calls").doc();
  activeCallId = callRef.id;

  pc.onicecandidate = (e) => { if (e.candidate) callRef.collection("callerCandidates").add(e.candidate.toJSON()); };
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));

  showCallScreen({ name: calleeName, grad: calleeGrad, isVideo, remoteStream, localStream, outgoing: true });

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await callRef.set({
    callerId: currentUser.uid, callerName: myProfile.name,
    calleeId: calleeUid, calleeName,
    type: isVideo ? "video" : "audio", status: "ringing",
    offer: { sdp: offer.sdp, type: offer.type },
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  });

  callDocUnsub = callRef.onSnapshot(async (snap) => {
    const data = snap.data();
    if (!data) return;
    if (data.status === "accepted" && data.answer && pc.currentRemoteDescription === null) {
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
    if (data.status === "ended") endCall(false);
  });

  callRef.collection("calleeCandidates").onSnapshot(snap => {
    snap.docChanges().forEach(c => { if (c.type === "added") pc.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
  });
}

function showIncomingCallUI(call){
  const modal = document.createElement("div");
  modal.id = "incoming-call-modal";
  modal.className = "modal-overlay center";
  modal.style.background = "rgba(0,0,0,0.85)";
  modal.innerHTML = `<div style="text-align:center;color:#fff">
    <div class="avatar" style="width:90px;height:90px;font-size:30px;background:linear-gradient(135deg,#7C6CFF,#35D0BA);margin:0 auto 14px">${initials(call.callerName)}</div>
    <p style="font-weight:800;font-size:18px">${escapeHtml(call.callerName)}</p>
    <p style="color:#aaa;font-size:13px;margin-top:4px">${call.type==="video"?"Видеозвонок":"Голосовой звонок"}...</p>
    <div style="display:flex;gap:30px;margin-top:26px;justify-content:center">
      <button class="call-btn end" onclick="declineCall('${call.id}')"><i data-lucide="phone-off"></i></button>
      <button class="call-btn" style="background:#35D0BA" onclick="acceptCall('${call.id}')"><i data-lucide="phone"></i></button>
    </div>
  </div>`;
  document.getElementById("modal-root").appendChild(modal);
  if (window.lucide) lucide.createIcons();
}

async function acceptCall(callId){
  document.getElementById("incoming-call-modal")?.remove();
  const callRef = db.collection("calls").doc(callId);
  const callSnap = await callRef.get();
  const call = callSnap.data();

  pc = new RTCPeerConnection(ICE_SERVERS);
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: call.type === "video" });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = (e) => { if (e.candidate) callRef.collection("calleeCandidates").add(e.candidate.toJSON()); };
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));

  activeCallId = callId;
  showCallScreen({ name: call.callerName, grad: "linear-gradient(135deg,#7C6CFF,#35D0BA)", isVideo: call.type==="video", remoteStream, localStream, outgoing: false });

  await pc.setRemoteDescription(new RTCSessionDescription(call.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await callRef.update({ status: "accepted", answer: { sdp: answer.sdp, type: answer.type } });

  callRef.collection("callerCandidates").onSnapshot(snap => {
    snap.docChanges().forEach(c => { if (c.type === "added") pc.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
  });

  callDocUnsub = callRef.onSnapshot(snap => { if (snap.data()?.status === "ended") endCall(false); });
}

function declineCall(callId){
  document.getElementById("incoming-call-modal")?.remove();
  db.collection("calls").doc(callId).update({ status: "ended" });
}

function showCallScreen({ name, grad, isVideo, remoteStream, localStream, outgoing }){
  const el = document.createElement("div");
  el.id = "call-screen";
  el.className = "call-screen";
  el.style.background = grad;
  el.innerHTML = `
    ${isVideo ? `<video class="remote-video" autoplay playsinline></video><video class="local-video" autoplay playsinline muted></video>` : ""}
    <div class="call-info" style="text-align:center;margin-top:20px">
      <div style="font-size:13px;color:rgba(255,255,255,.8)">${isVideo?"Видеозвонок":"Голосовой звонок"}</div>
      <h2 style="font-weight:800;font-size:26px;margin:6px 0">${escapeHtml(name)}</h2>
      <div id="call-timer" style="font-size:14px;color:rgba(255,255,255,.75)">${outgoing?"вызов...":"00:00"}</div>
    </div>
    ${!isVideo ? `<div class="call-avatar">${initials(name)}</div>` : `<div></div>`}
    <div class="call-controls">
      <button class="call-btn" id="call-mute"><i data-lucide="mic"></i></button>
      <button class="call-btn end" id="call-end"><i data-lucide="phone-off"></i></button>
      <button class="call-btn" id="call-speaker"><i data-lucide="${isVideo?"video":"volume-2"}"></i></button>
    </div>`;
  document.body.appendChild(el);
  if (window.lucide) lucide.createIcons();

  if (isVideo) {
    el.querySelector(".remote-video").srcObject = remoteStream;
    el.querySelector(".local-video").srcObject = localStream;
  }

  let seconds = 0, timerInt = null;
  const startTimer = () => { timerInt = setInterval(()=>{ seconds++; const m=String(Math.floor(seconds/60)).padStart(2,"0"), s=String(seconds%60).padStart(2,"0"); const t=document.getElementById("call-timer"); if(t) t.textContent=`${m}:${s}`; }, 1000); };
  if (!outgoing) startTimer(); else setTimeout(startTimer, 1500);

  let muted = false;
  document.getElementById("call-mute").addEventListener("click", () => {
    muted = !muted;
    localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  });
  document.getElementById("call-end").addEventListener("click", () => endCall(true));
}

async function endCall(updateFirestore){
  document.getElementById("call-screen")?.remove();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (pc) pc.close();
  if (updateFirestore && activeCallId) await db.collection("calls").doc(activeCallId).update({ status: "ended" }).catch(()=>{});
  if (callDocUnsub) callDocUnsub();
  pc = null; localStream = null; activeCallId = null;
}

/* ---------- CHAT INPUT: текст, вложения, голос/видео-кружки ---------- */

function wireChatInput(){
  const input = document.getElementById("chat-input");
  const sendBtn = document.getElementById("btn-send");
  const voiceBtn = document.getElementById("btn-voice");
  const attachBtn = document.getElementById("btn-attach");
  const attachTray = document.getElementById("chat-attach-tray");
  const fileInput = document.getElementById("file-input");

  function refresh(){
    const hasText = input.value.trim().length > 0;
    sendBtn.style.display = hasText ? "flex" : "none";
    voiceBtn.style.display = hasText ? "none" : "flex";
  }
  input.addEventListener("input", refresh);
  refresh();

  sendBtn.addEventListener("click", async () => {
    const text = input.value; input.value = ""; refresh();
    await sendTextMessage(text);
  });
  input.addEventListener("keydown", e => { if (e.key === "Enter") sendBtn.click(); });

  attachBtn.addEventListener("click", () => {
    if (attachTray.style.display === "none") {
      attachTray.style.display = "flex";
      attachTray.innerHTML = `
        <div class="attach-opt" id="attach-media"><i data-lucide="image"></i>Фото/Видео</div>
        <div class="attach-opt" id="attach-file"><i data-lucide="file-text"></i>Файл</div>
        <div class="attach-opt" id="attach-video-circle"><i data-lucide="video"></i>Видео-кружок</div>`;
      if (window.lucide) lucide.createIcons();
      document.getElementById("attach-media").addEventListener("click", () => { fileInput.accept = "image/*,video/*"; fileInput.click(); });
      document.getElementById("attach-file").addEventListener("click", () => { fileInput.accept = "*"; fileInput.click(); });
      document.getElementById("attach-video-circle").addEventListener("click", () => { openCircleRecorder(); attachTray.style.display = "none"; });
    } else {
      attachTray.style.display = "none";
    }
  });

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (file) await sendImageOrFile(file);
    fileInput.value = "";
    attachTray.style.display = "none";
  });

  // голосовое — удержание кнопки: начать запись, отпустить — отправить
  let recStartTime = 0;
  const startVoice = async (e) => {
    e.preventDefault();
    voiceBtn.classList.add("recording");
    await startRecording(false);
    recStartTime = Date.now();
  };
  const stopVoice = async () => {
    if (!voiceBtn.classList.contains("recording")) return;
    voiceBtn.classList.remove("recording");
    const dur = (Date.now() - recStartTime) / 1000;
    if (dur < 1) { mediaRecorder.stream.getTracks().forEach(t=>t.stop()); return; }
    await stopRecordingAndSend(false, dur);
  };
  voiceBtn.addEventListener("mousedown", startVoice);
  voiceBtn.addEventListener("touchstart", startVoice);
  voiceBtn.addEventListener("mouseup", stopVoice);
  voiceBtn.addEventListener("touchend", stopVoice);
}

function openCircleRecorder(){
  const modal = document.createElement("div");
  modal.className = "modal-overlay center";
  modal.innerHTML = `<div class="card modal-sheet card2" style="text-align:center;max-width:300px;padding:20px">
    <p style="font-weight:600;margin-bottom:14px">Запись видео-кружка</p>
    <div id="circle-rec-status" style="font-size:13px;color:var(--sub);margin-bottom:14px">Нажми, чтобы начать</div>
    <button class="btn-primary full" id="circle-rec-btn">Начать запись</button>
  </div>`;
  document.getElementById("modal-root").appendChild(modal);
  modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });

  let recording = false, start = 0;
  document.getElementById("circle-rec-btn").addEventListener("click", async function(){
    if (!recording) {
      await startRecording(true);
      recording = true; start = Date.now();
      this.textContent = "Остановить";
      document.getElementById("circle-rec-status").textContent = "Идёт запись...";
    } else {
      const dur = (Date.now() - start) / 1000;
      await stopRecordingAndSend(true, dur);
      modal.remove();
    }
  });
}

/* ---------- PROFILE ---------- */

async function renderProfileView(isMe, uid){
  const person = isMe ? myProfile : await getUserProfile(uid);
  const containerId = isMe ? "view-profile" : "view-contact-profile";
  const container = document.getElementById(containerId);

  container.innerHTML = `
    ${!isMe ? `<div class="chat-header card"><button class="icon-btn" id="contact-profile-back"><i data-lucide="chevron-left"></i></button><div style="flex:1;text-align:center;font-weight:600">${escapeHtml(person.username||"")}</div><div style="width:36px"></div></div>` : ""}
    <div class="profile-head">
      <div class="profile-avatar-wrap">
        <div class="avatar" style="width:84px;height:84px;font-size:26px;margin:0 auto;${avatarBg(person)}">${avatarInner(person)}</div>
        ${isMe ? `<div class="profile-avatar-edit" id="avatar-edit-btn"><i data-lucide="camera" style="width:13px;height:13px;color:#fff"></i></div>` : ""}
      </div>
      <div class="profile-name">${escapeHtml(person.name)}</div>
      <div class="profile-username">${escapeHtml(person.username||"")}</div>
      <div class="profile-bio">${escapeHtml(person.bio || "")}</div>
      <div class="profile-actions">
        ${isMe
          ? `<button class="btn-secondary" style="flex:1" id="edit-profile-btn">Редактировать профиль</button>`
          : `<button class="btn-primary" style="flex:1" id="contact-message-btn">Написать</button>
             <button class="icon-btn" id="contact-call-audio"><i data-lucide="phone"></i></button>
             <button class="icon-btn" id="contact-call-video"><i data-lucide="video"></i></button>`}
      </div>
    </div>
    <input type="file" id="avatar-file-input" accept="image/*" style="display:none" />`;

  if (window.lucide) lucide.createIcons();

  if (isMe) {
    document.getElementById("edit-profile-btn").addEventListener("click", openEditProfileModal);
    document.getElementById("avatar-edit-btn").addEventListener("click", () => document.getElementById("avatar-file-input").click());
    document.getElementById("avatar-file-input").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const path = `avatars/${currentUser.uid}_${Date.now()}_${file.name}`;
      const ref = storage.ref(path);
      await ref.put(file);
      const url = await ref.getDownloadURL();
      await db.collection("users").doc(currentUser.uid).update({ avatarUrl: url });
      myProfile.avatarUrl = url;
      renderProfileView(true);
    });
  } else {
    document.getElementById("contact-profile-back").addEventListener("click", () => showView(currentTab));
    document.getElementById("contact-message-btn").addEventListener("click", () => openOrCreateDm(uid));
    document.getElementById("contact-call-audio").addEventListener("click", () => startCall(uid, person.name, person.grad, false));
    document.getElementById("contact-call-video").addEventListener("click", () => startCall(uid, person.name, person.grad, true));
  }
}

function openContactProfile(uid){
  showView("contact-profile");
  renderProfileView(false, uid);
}

function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme === "dark" ? "dark" : "");
  localStorage.setItem("bubbles-theme", theme);
}

  const brand = document.querySelector(".brand");

/* ---------- QR: показать / сканировать / скопировать ссылку ---------- */

function openQRModal(){
  const link = `${location.origin}${location.pathname}?add=${currentUser.uid}`;
  const modal = document.createElement("div");
  modal.className = "modal-overlay center";
  modal.innerHTML = `<div class="card modal-sheet card2" style="max-width:320px;text-align:center;padding:22px">
    <h3 style="font-weight:700;margin-bottom:4px">Мой QR-код</h3>
    <p style="font-size:12px;color:var(--sub);margin-bottom:16px">${myProfile.username||""}</p>
    <div id="qr-canvas" style="width:190px;height:190px;margin:0 auto;background:#fff;border-radius:10px;padding:10px;border:1px solid var(--border)"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn-secondary" style="flex:1" id="qr-copy-btn">Скопировать ссылку</button>
      <button class="btn-secondary" style="flex:1" id="qr-scan-btn">Сканировать</button>
    </div>
    <button class="btn-primary full" style="margin-top:8px" onclick="this.closest('.modal-overlay').remove()">Готово</button>
  </div>`;
  document.getElementById("modal-root").appendChild(modal);
  modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
  new QRCode(document.getElementById("qr-canvas"), { text: link, width: 170, height: 170 });
  document.getElementById("qr-copy-btn").addEventListener("click", async () => {
    await navigator.clipboard.writeText(link);
    document.getElementById("qr-copy-btn").textContent = "Скопировано!";
    setTimeout(() => { document.getElementById("qr-copy-btn").textContent = "Скопировать ссылку"; }, 1500);
  });
  document.getElementById("qr-scan-btn").addEventListener("click", () => { modal.remove(); openQRScanner(); });
}

function openQRScanner(){
  const modal = document.createElement("div");
  modal.className = "modal-overlay center";
  modal.style.background = "#000";
  modal.innerHTML = `<div style="width:100%;text-align:center;color:#fff">
    <video id="qr-video" style="width:100%;max-width:400px;border-radius:10px" playsinline></video>
    <canvas id="qr-canvas-hidden" style="display:none"></canvas>
    <p style="margin-top:14px;font-size:13px">Наведи камеру на QR-код друга</p>
    <button class="btn-secondary" style="margin-top:14px" id="qr-scan-close">Отмена</button>
  </div>`;
  document.getElementById("modal-root").appendChild(modal);

  const video = document.getElementById("qr-video");
  const canvas = document.getElementById("qr-canvas-hidden");
  const ctx = canvas.getContext("2d");
  let stream, scanning = true;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
    stream = s; video.srcObject = s; video.play(); requestAnimationFrame(tick);
  }).catch(() => { alert("Нет доступа к камере"); modal.remove(); });

  function tick(){
    if (!scanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code) {
        let uid = null;
        try {
          const url = new URL(code.data);
          uid = url.searchParams.get("add");
        } catch { if (code.data.startsWith("bubbles:")) uid = code.data.replace("bubbles:",""); }
        if (uid) {
          scanning = false;
          stream.getTracks().forEach(t => t.stop());
          modal.remove();
          openOrCreateDm(uid);
          return;
        }
      }
    }
    requestAnimationFrame(tick);
  }

  document.getElementById("qr-scan-close").addEventListener("click", () => {
    scanning = false;
    if (stream) stream.getTracks().forEach(t => t.stop());
    modal.remove();
  });
}

/* ---------- NEW CHAT / GROUP ---------- */

function openNewChatModal(){
  const modal = document.createElement("div");
  modal.className = "modal-overlay";
  modal.innerHTML = `<div class="card modal-sheet">
    <div class="modal-drag"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn-secondary" style="flex:1" id="mode-search">Найти по нику</button>
      <button class="btn-secondary" style="flex:1" id="mode-group">Создать группу</button>
    </div>
    <div id="new-chat-body"></div>
  </div>`;
  document.getElementById("modal-root").appendChild(modal);
  modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });

  const body = document.getElementById("new-chat-body");
  function renderSearch(){
    body.innerHTML = `<input id="user-search-input" class="input" placeholder="Никнейм пользователя..." /><div id="user-search-results" class="list"></div>`;
    document.getElementById("user-search-input").addEventListener("input", async (e) => {
      const q = e.target.value.trim().replace(/^@/,"").toLowerCase();
      const results = document.getElementById("user-search-results");
      if (!q) { results.innerHTML = ""; return; }
      const snap = await db.collection("users")
        .where("username", ">=", "@"+q).where("username", "<=", "@"+q+"\uf8ff").limit(10).get();
      results.innerHTML = "";
      snap.forEach(d => {
        const u = d.data();
        if (u.uid === currentUser.uid) return;
        const row = document.createElement("div");
        row.className = "list-row";
        row.innerHTML = `<div class="avatar" style="width:40px;height:40px;font-size:13px;${avatarBg(u)}">${avatarInner(u)}</div><div class="list-row-body"><div class="list-row-name">${escapeHtml(u.name)}</div><div style="font-size:12px;color:var(--sub)">${u.username}</div></div>`;
        row.addEventListener("click", () => { modal.remove(); openOrCreateDm(u.uid); });
        results.appendChild(row);
      });
    });
  }
  function renderGroup(){
    body.innerHTML = `<input id="group-name-input" class="input" placeholder="Название группы" /><input id="group-members-input" class="input" placeholder="Ники участников через запятую" /><button class="btn-primary full" id="group-create-btn">Создать</button>`;
    document.getElementById("group-create-btn").addEventListener("click", async () => {
      const name = document.getElementById("group-name-input").value.trim();
      const usernames = document.getElementById("group-members-input").value.split(",").map(s=>s.trim().replace(/^@/,"")).filter(Boolean);
      if (!name || usernames.length === 0) return;
      const uids = [];
      for (const uname of usernames) {
        const snap = await db.collection("users").where("username","==","@"+uname).limit(1).get();
        if (!snap.empty) uids.push(snap.docs[0].data().uid);
      }
      if (uids.length === 0) { alert("Никого не нашли по этим никам"); return; }
      modal.remove();
      createGroupChat(name, uids);
    });
  }
  document.getElementById("mode-search").addEventListener("click", renderSearch);
  document.getElementById("mode-group").addEventListener("click", renderGroup);
  renderSearch();
}
